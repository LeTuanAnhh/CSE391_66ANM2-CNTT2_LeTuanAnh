<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lab JS Cơ bản - Hoạt động 3</title>
  <style>
    /* Thêm một chút khoảng cách cho dễ nhìn */
    section {
      padding: 20px;
      line-height: 1.6;
    }
    button {
      margin-right: 10px;
      padding: 5px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <section>
    <h2>DOM & Sự kiện</h2>
    <p id="status">Chưa có tương tác...</p>

    <button id="btnHello">Chào</button>
    <button id="btnRed">Đổi màu nền thành đỏ</button>

    <div style="margin-top: 20px;">
      <label>Nhập tên của bạn: </label>
      <input id="nameInput" type="text" placeholder="Gõ tên vào đây..." />
      <p id="greeting" style="font-weight: bold; color: blue;"></p>
    </div>
  </section>

  <script src="dom.js"></script>

</body>
</html>
